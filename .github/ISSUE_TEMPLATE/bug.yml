name: Bug / Validation Issue
description: Report a problem with skill discovery, installation, or structure
title: "bug: <short summary>"
labels: ["bug"]
body:
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      description: Include commands and outputs if possible
      placeholder: |
        1. npx skills add zhyGuGu/agent-skills-collection --list --full-depth
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: macOS 14, Node 20, skills CLI <version>
    validations:
      required: false
